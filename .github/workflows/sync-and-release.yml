name: Sync Fork and Release Docker Image

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  sync-and-check-update:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.extract_version.outputs.version }}
      should_release: ${{ steps.check_update.outputs.should_release }}
    
    steps:
    - name: Checkout this repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.TOKEN }}
        fetch-depth: 0

    - name: Setup Git Config
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Add upstream remote and fetch
      run: |
        git remote add upstream https://github.com/Penty-d/qq-farm-bot-ui.git
        git fetch upstream

    - name: Check for updates from upstream/main
      id: check_diff
      run: |
        LOCAL=$(git rev-parse HEAD)
        REMOTE=$(git rev-parse upstream/main)
        
        if [ "$LOCAL" = "$REMOTE" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
        else
            echo "has_changes=true" >> $GITHUB_OUTPUT
        fi

    - name: Sync fork with upstream (if needed)
      if: steps.check_diff.outputs.has_changes == 'true'
      run: |
        git checkout main
        git fetch upstream
        git merge -s recursive -X theirs upstream/main
        
        if git ls-files -u | grep -q .; then
            git status
            exit 1
        fi
        
        git push origin main

    - name: Extract version from Update.log
      id: extract_version
      run: |
        git checkout main
        
        if [ -f Update.log ]; then
            LOG_CONTENT=$(cat Update.log)
            VERSION=$(echo "$LOG_CONTENT" | grep -oP '后端：\s*v?\d+\.\d+\.\d+' | head -1 | sed 's/后端：\s*//')
            
            if [ -n "$VERSION" ]; then
                if [[ ! "$VERSION" =~ ^v ]]; then
                    VERSION="v$VERSION"
                fi
                echo "version=$VERSION" >> $GITHUB_OUTPUT
            else
                echo "version=" >> $GITHUB_OUTPUT
            fi
        else
            echo "version=" >> $GITHUB_OUTPUT
        fi

    - name: Determine if release should proceed
      id: check_update
      run: |
        if [ "${{ steps.check_diff.outputs.has_changes }}" = "true" ] && [ -n "${{ steps.extract_version.outputs.version }}" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
        else
            echo "should_release=false" >> $GITHUB_OUTPUT
        fi

  create-tag-and-trigger-workflows:
    needs: sync-and-check-update
    if: needs.sync-and-check-update.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}
          fetch-depth: 0

      - name: Create Git tag (skip if already exists)
        id: create_tag
        run: |
          NEW_VERSION="${{ needs.sync-and-check-update.outputs.new_version }}"
          
          if git rev-parse "$NEW_VERSION" >/dev/null 2>&1; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if git ls-remote --tags origin "$NEW_VERSION" | grep -q "$NEW_VERSION"; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          git tag "$NEW_VERSION"
          git push origin "$NEW_VERSION"
          echo "tag_exists=false" >> $GITHUB_OUTPUT

      - name: Exit early if tag already existed
        if: steps.create_tag.outputs.tag_exists == 'true'
        run: exit 0

      - name: Wait for tag to propagate
        run: sleep 5

      - name: Trigger Docker Build Workflow
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/docker-image.yml/dispatches \
            -d '{"ref":"main", "inputs":{"version_tag":"${{ needs.sync-and-check-update.outputs.new_version }}"}}'

      - name: Trigger Release Workflow
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/release.yml/dispatches \
            -d '{"ref":"main", "inputs":{"version_tag":"${{ needs.sync-and-check-update.outputs.new_version }}"}}'
