name: Sync Fork and Release Docker Image

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  sync-and-check-update:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.extract_version.outputs.version }}
      should_release: ${{ steps.check_update.outputs.should_release }}
    
    steps:
    - name: Checkout this repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.TOKEN }}
        fetch-depth: 0

    - name: Setup Git Config
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Add upstream remote and fetch
      run: |
        git remote add upstream https://github.com/Penty-d/qq-farm-bot-ui.git
        git fetch upstream

    - name: Check for updates from upstream/main
      id: check_diff
      run: |
        LOCAL=$(git rev-parse HEAD)
        REMOTE=$(git rev-parse upstream/main)
        if [ "$LOCAL" = "$REMOTE" ]; then
          echo "has_changes=false" >> $GITHUB_OUTPUT
        else
          echo "has_changes=true" >> $GITHUB_OUTPUT
        fi

    - name: Exit early if no upstream changes
      if: steps.check_diff.outputs.has_changes != 'true'
      run: exit 0

    - name: Sync fork with upstream
      run: |
        git checkout main
        git fetch upstream
        git merge -s recursive -X theirs upstream/main
        if git ls-files -u | grep -q .; then
          git status
          exit 1
        fi
        git push origin main

    - name: Extract version from Update.log
      id: extract_version
      run: |
        git checkout main
        if [ -f Update.log ]; then
          VERSION=$(cat Update.log | grep -oP '后端：\s*v?\d+\.\d+\.\d+' | head -1 | sed 's/后端：\s*//')
          if [ -n "$VERSION" ]; then
            [[ "$VERSION" =~ ^v ]] || VERSION="v$VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            exit 0
          fi
        fi
        echo "version=" >> $GITHUB_OUTPUT

    - name: Determine if release should proceed
      id: check_update
      run: |
        if [ -n "${{ steps.extract_version.outputs.version }}" ]; then
          echo "should_release=true" >> $GITHUB_OUTPUT
        else
          echo "should_release=false" >> $GITHUB_OUTPUT
        fi

  create-tag:
    needs: sync-and-check-update
    if: needs.sync-and-check-update.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}
          fetch-depth: 0

      - name: Create and push Git tag (skip if exists)
        run: |
          NEW_VERSION="${{ needs.sync-and-check-update.outputs.new_version }}"
          if git ls-remote --tags origin "$NEW_VERSION" | grep -q "$NEW_VERSION"; then
            echo "Tag $NEW_VERSION already exists. Skipping."
            exit 0
          fi
          git tag "$NEW_VERSION"
          git push origin "$NEW_VERSION"
