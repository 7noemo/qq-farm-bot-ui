name: Sync Fork and Release Docker Image

on:
  schedule:
    # 每6小时检查一次 (分钟 小时 日 月 星期)
    - cron: '0 */6 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  sync-and-check-update:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.extract_version.outputs.version }}
      should_release: ${{ steps.check_update.outputs.should_release }}
    
    steps:
    - name: Checkout this repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.TOKEN }}
        fetch-depth: 0 # 获取完整历史以便正确合并

    - name: Setup Git Config
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Add upstream remote and fetch
      run: |
        git remote add upstream https://github.com/Penty-d/qq-farm-bot-ui.git
        git fetch upstream

    - name: Check for updates from upstream/main
      id: check_diff
      run: |
        LOCAL=$(git rev-parse HEAD)
        REMOTE=$(git rev-parse upstream/main)
        
        if [ $LOCAL = $REMOTE ]; then
            echo "Branch is up to date with upstream."
            echo "has_changes=false" >> $GITHUB_OUTPUT
        else
            echo "Local branch differs from upstream. Changes detected."
            echo "has_changes=true" >> $GITHUB_OUTPUT
        fi

    - name: Sync fork with upstream (if needed)
      if: steps.check_diff.outputs.has_changes == 'true'
      run: |
        echo "Syncing local 'main' branch with upstream..."
        git merge upstream/main --no-edit
        git push origin main
        echo "Fork synced with upstream."

    - name: Extract version from Update.log
      id: extract_version
      run: |
        # 确保在最新的主分支上操作
        git checkout main
        
        if [ -f Update.log ]; then
            # 读取第一行
            FIRST_LINE=$(head -n 1 Update.log)
            echo "Update.log first line: $FIRST_LINE"
            
            # 尝试从第一行中提取版本号 (例如 v2.0.4)
            VERSION=$(echo "$FIRST_LINE" | grep -oP 'v\d+\.\d+\.\d+' | head -1)
            
            if [ -n "$VERSION" ]; then
                echo "Successfully extracted version: $VERSION"
                echo "version=$VERSION" >> $GITHUB_OUTPUT
            else
                echo "Warning: No version pattern (e.g., v1.2.3) found in Update.log first line."
                echo "version=" >> $GITHUB_OUTPUT
            fi
        else
            echo "Error: Update.log file not found in the root directory."
            echo "version=" >> $GITHUB_OUTPUT
        fi

    - name: Determine if release should proceed
      id: check_update
      run: |
        # 只有当存在上游更新 AND 成功提取到版本号时，才进行发布
        if [ "${{ steps.check_diff.outputs.has_changes }}" = "true" ] && [ -n "${{ steps.extract_version.outputs.version }}" ]; then
            echo "Upstream has changes and a new version was extracted. Proceeding with release."
            echo "should_release=true" >> $GITHUB_OUTPUT
        else
            echo "Either no upstream changes were found or no version could be extracted. Skipping release."
            echo "should_release=false" >> $GITHUB_OUTPUT
        fi

  create-tag-and-trigger-workflows:
    needs: sync-and-check-update
    if: needs.sync-and-check-update.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取所有标签和提交历史

      - name: Create Git tag
        run: |
          NEW_VERSION="${{ needs.sync-and-check-update.outputs.new_version }}"
          echo "Creating git tag: $NEW_VERSION"
          git tag "$NEW_VERSION"
          git push origin "$NEW_VERSION"

      - name: Trigger Docker Build Workflow
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/docker-image.yml/dispatches \
            -d '{"ref":"main", "inputs":{"version_tag":"${{ needs.sync-and-check-update.outputs.new_version }}"}}'

      - name: Trigger Release Workflow
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/release.yml/dispatches \
            -d '{"ref":"main", "inputs":{"version_tag":"${{ needs.sync-and-check-update.outputs.new_version }}"}}'
