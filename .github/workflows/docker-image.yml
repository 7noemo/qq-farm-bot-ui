name: Build and Push Multi-Arch Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Docker image tag (e.g., v1.0.0). Leave empty for latest only.'
        required: false
        default: ''
  
  workflow_call:
    inputs:
      version:
        description: 'Version tag passed from upstream sync'
        required: false
        type: string
        default: ''

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/ar1995/qq-farm-bot-ui
          tags: |
            type=raw,value=latest
            type=raw,value=${{ inputs.version }},enable={{ inputs.version != '' && inputs.version != null }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          # 【关键修改】构建上下文设置为 ./core
          context: ./core
          # 【关键修改】Dockerfile 路径设置为 ./core/Dockerfile
          file: ./core/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 如果遇到 provenance 报错，可以解开下面这行
          # provenance: false
