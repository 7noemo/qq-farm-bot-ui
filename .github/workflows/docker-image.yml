name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Optional Version Tag (e.g., v1.0.0)'
        required: false
        default: ''
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        platforms: linux/amd64,linux/arm64,linux/arm/v7

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ar1995/qq-farm-bot-ui
        tags: |
          type=raw,value=latest
          ${{ inputs.version_tag }}
        flavor: |
          latest=true

    - name: Build and push Docker image
      id: build-and-push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./core/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64,linux/arm/v7

    - name: Trigger Release Workflow after Docker Build
      if: success()
      run: |
        VERSION_TAG="${{ inputs.version_tag }}"
        
        if [ -z "$VERSION_TAG" ]; then
          echo "No version tag provided, skipping release workflow trigger."
          exit 0
        fi
        
        echo "Docker image built successfully. Triggering release workflow for tag: $VERSION_TAG"
        
        curl -X POST \
          -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository_owner }}/${{ github.event.repository.name }}/actions/workflows/release.yml/dispatches \
          -d "{\"ref\":\"main\", \"inputs\":{\"version_tag\":\"${VERSION_TAG}\"}}"
