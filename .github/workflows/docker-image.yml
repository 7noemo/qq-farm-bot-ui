name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Optional Version Tag (e.g., v1.0.0)'
        required: false
        default: ''
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Determine version tag
      id: get_tag
      run: |
        INPUT_TAG="${{ github.event.inputs.version_tag }}"
        REF_NAME="${{ github.ref_name }}"
        REF="${{ github.ref }}"

        if [ -n "$INPUT_TAG" ]; then
          TAG="$INPUT_TAG"
        elif [[ "$REF" == refs/tags/v* ]]; then
          TAG="$REF_NAME"
        else
          TAG="latest"
        fi

        if [[ "$TAG" != latest ]] && [[ ! "$TAG" =~ ^v[0-9] ]]; then
          echo "Warning: Tag '$TAG' does not follow 'vX.Y.Z' format. Using as-is."
        fi

        echo "version_tag=$TAG" >> $GITHUB_OUTPUT

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        platforms: linux/amd64,linux/arm64,linux/arm/v7

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Prepare Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ar1995/qq-farm-bot-ui
        tags: |
          type=raw,value=${{ steps.get_tag.outputs.version_tag }}
          type=raw,value=latest,enable=${{ steps.get_tag.outputs.version_tag == 'latest' }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./core/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64,linux/arm/v7

    - name: Trigger Release Workflow (only for valid version tags)
      if: startsWith(steps.get_tag.outputs.version_tag, 'v')
      run: |
        curl -X POST \
          -H "Authorization: Bearer ${{ secrets.TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/release.yml/dispatches \
          -d "{\"ref\":\"main\", \"inputs\":{\"version_tag\":\"${{ steps.get_tag.outputs.version_tag }}\"}}"
